name: terraform-flink

# ============================================================================
# CI for the terraform/ tree — plan, apply, destroy across dev/uat/prd.
#
#   • workflow_dispatch picks `stack` (dev / uat / prd) and `action`
#     (plan / apply / destroy).
#   • PRs touching terraform/, tools/, or this workflow run plan-only against
#     dev — review-time validation, no infra changes.
#
# State backend: Azure Storage (azurerm). Auth: OIDC / Workload Identity
# Federation. The Entra app registration has NO client secret — it trusts
# GitHub Actions OIDC tokens via federated credentials (configured by
# tools/bootstrap-azure-state.sh).
# Required GitHub repo secrets — see .github/README.md.
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Environment under terraform/live/"
        type: choice
        required: true
        options: [dev, uat, prd]
        default: dev
      action:
        description: "Terragrunt action"
        type: choice
        required: true
        options: [plan, apply, destroy]
        default: plan
  pull_request:
    paths:
      - "terraform/**"
      - "tools/**"
      - ".github/workflows/terraform-flink.yml"

permissions:
  contents: read
  id-token: write   # required for OIDC token issuance to azurerm provider/backend

# Cancel in-progress runs only for PRs (rapid iteration). For workflow_dispatch
# (apply / destroy) we never cancel — interrupting an apply mid-flight risks
# leaving Confluent resources orphaned without state to track them.
concurrency:
  group: terraform-flink-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  terragrunt:
    name: terragrunt ${{ github.event.inputs.action || 'plan' }} (${{ github.event.inputs.stack || 'dev' }})
    runs-on: ubuntu-latest
    env:
      # ---- Confluent secrets are pulled from AKV by root.hcl at plan time ----
      # Pass the AKV identifiers (non-sensitive) so the generated provider.tf
      # can locate the vault. Names live as repo *vars*, not secrets.
      TF_VAR_azure_key_vault_name:                ${{ vars.AZURE_KEY_VAULT_NAME }}
      TF_VAR_azure_key_vault_resource_group_name: ${{ vars.AZURE_KEY_VAULT_RESOURCE_GROUP_NAME }}

      # ---- Azure auth: OIDC (Workload Identity Federation) ----
      # The azurerm provider + backend pick up ARM_USE_OIDC=true and exchange
      # the GitHub-issued OIDC token (granted by `id-token: write` above) for
      # an Azure access token. No client secret is stored or transmitted.
      ARM_USE_OIDC:        "true"
      ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}

      # ---- State backend location (read by terraform/live/root.hcl) ----
      TG_STATE_RESOURCE_GROUP:  ${{ secrets.TG_STATE_RESOURCE_GROUP }}
      TG_STATE_STORAGE_ACCOUNT: ${{ secrets.TG_STATE_STORAGE_ACCOUNT }}
      TG_STATE_CONTAINER:       ${{ secrets.TG_STATE_CONTAINER }}

      TARGET_STACK: ${{ github.event_name == 'workflow_dispatch' && inputs.stack || 'dev' }}
      TG_ACTION:    ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pinned tools
        run: |
          # Invoked via bash so the exec bit on install.sh isn't required —
          # file-mode bits get stripped by some copy/zip paths.
          bash tools/install.sh
          echo "${GITHUB_WORKSPACE}/tools/bin" >> "${GITHUB_PATH}"

      - name: Version check
        run: |
          terraform -version
          terragrunt -version

      - name: Terragrunt init
        working-directory: terraform/live/${{ env.TARGET_STACK }}
        run: terragrunt run-all init -input=false --terragrunt-non-interactive

      - name: "Terragrunt ${{ env.TG_ACTION }}"
        working-directory: terraform/live/${{ env.TARGET_STACK }}
        # `--terragrunt-non-interactive` suppresses Terragrunt's own confirmation
        # prompts (e.g. the dependent-modules warning on destroy), separate from
        # Terraform's `-auto-approve`.
        run: |
          case "${TG_ACTION}" in
            plan)    terragrunt run-all plan    -input=false --terragrunt-non-interactive ;;
            apply)   terragrunt run-all apply   -input=false -auto-approve --terragrunt-non-interactive ;;
            destroy) terragrunt run-all destroy -input=false -auto-approve --terragrunt-non-interactive ;;
          esac
